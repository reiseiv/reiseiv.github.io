<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rei Academy / 404</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 20px;
        }

        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: contentFadeIn 0.8s var(--ease-smooth);
        }

        /* Wielki napis 404 z agresywnym gradientem */
        .error-code {
            font-family: var(--font-display);
            font-size: clamp(8rem, 30vw, 15rem); /* Powrót do gigantycznego rozmiaru */
            font-weight: 800;
            line-height: 0.8;
            letter-spacing: -0.08em;
            background: linear-gradient(135deg, #fff 0%, var(--accent-primary) 50%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            user-select: none;
            filter: drop-shadow(0 0 30px rgba(147, 51, 234, 0.3));
            margin-bottom: 10px;
        }

        /* Efekt Glitch dla tytułu */
        .error-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            display: inline-block;
        }

        .error-title::before,
        .error-title::after {
            content: "BRAK PŁYNNOŚCI";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-base);
        }

        .error-title::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .error-title::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(16px, 9999px, 78px, 0); }
            60% { clip: rect(87px, 9999px, 11px, 0); }
            80% { clip: rect(54px, 9999px, 33px, 0); }
            100% { clip: rect(22px, 9999px, 90px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(12px, 9999px, 55px, 0); }
            40% { clip: rect(95px, 9999px, 22px, 0); }
            60% { clip: rect(43px, 9999px, 88px, 0); }
            80% { clip: rect(21px, 9999px, 64px, 0); }
            100% { clip: rect(76px, 9999px, 15px, 0); }
        }

        .mini-dom {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 280px;
            font-family: monospace;
            font-size: 0.85rem;
            margin: 20px 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .dom-row { display: flex; justify-content: space-between; padding: 4px 8px; }
        .dom-row.ask { color: #f87171; }
        .dom-row.bid { color: #34d399; }
        .dom-row.lvn { 
            background: rgba(216, 180, 254, 0.1);
            color: var(--accent-glow);
            border: 1px dashed var(--accent-glow);
            font-weight: bold;
        }

        .error-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            max-width: 400px;
            line-height: 1.6;
        }

        .back-btn {
            margin-top: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 14px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s var(--transition-base);
        }

        .back-btn:hover {
            border-color: var(--accent-glow);
            transform: translateY(-2px);
            background: rgba(147, 51, 234, 0.1);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.2);
        }
    </style>
</head>
<body>
    <div id="ambient-wrapper"><div class="ambient-blobs"></div></div>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Brak płynności</h2>

        <div class="mini-dom">
            <div class="dom-row ask"><span>405.00</span><span>1.2k</span></div>
            <div class="dom-row lvn"><span>404.00</span><span>VACUUM</span></div>
            <div class="dom-row bid"><span>403.00</span><span>0.8k</span></div>
        </div>

        <p class="error-desc">
            Algorytm nie odnalazł zasobów na tym poziomie. Twoje zapytanie wywołało <strong>Vacuum Effect</strong> – strona nie istnieje.
        </p>

        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Wróć do bazy
        </a>
    </div>

    <script src="app.js"></script>
</body>
</html>
