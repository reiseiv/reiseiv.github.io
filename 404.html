<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei Academy / 404</title>
    
    <link rel="stylesheet" href="loader.css">
    <script src="loader.js"></script>

    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            /* Nadpisujemy domyślne zachowanie ze style.css dla strony 404 (wyśrodkowanie) */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: smoothFade 0.4s ease-out;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -4px;
            background: linear-gradient(135deg, var(--down-color) 0%, var(--up-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: -10px;
            filter: drop-shadow(0 12px 24px rgba(0,0,0,0.1));
            user-select: none;
        }

        .error-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--heading-color);
        }

        .error-desc {
            font-size: 1rem;
            color: var(--secondary-text);
            font-weight: 400;
            max-width: 420px;
            margin: 0 auto;
        }

        /* Glassmorphism 2.0 dla drabiny DOM */
        .mini-dom {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(255,255,255,0.015);
            border: 1px solid var(--border-color);
            padding: 24px 32px;
            border-radius: var(--radius-lg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.03), 0 10px 30px rgba(0,0,0,0.2);
            font-family: 'SF Mono', ui-monospace, 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            margin: 10px 0 20px 0;
            user-select: none;
            width: 100%;
            max-width: 320px;
            transition: all 0.3s ease;
        }

        .mini-dom:hover {
            border-color: rgba(255,255,255,0.1); 
            transform: translateY(-2px); 
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.06), 0 14px 40px rgba(0,0,0,0.4); 
        }

        body.light-theme .mini-dom {
            background: linear-gradient(160deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.4) 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 10px 30px rgba(0,0,0,0.05);
        }

        .mini-dom-row {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .mini-dom-row:last-child { border-bottom: none; }

        .mini-dom-row.ask { color: var(--up-color); font-weight: 600; }
        .mini-dom-row.bid { color: var(--down-color); font-weight: 600; }
        .mini-dom-row.empty { color: var(--secondary-text); opacity: 0.5; font-style: italic; }

        /* Przycisk powrotu - Glassmorphism 2.0 (jak na stronie głównej) */
        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.03), 0 4px 14px rgba(0,0,0,0.2);
            font-family: inherit;
        }

        body.light-theme .back-btn { 
            background: rgba(0,0,0,0.05); color: #1d1d1f; border-color: rgba(0,0,0,0.1); box-shadow: none; 
        }

        .back-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 230, 118, 0.4);
            color: var(--up-color);
            background: rgba(0, 230, 118, 0.05);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.06), 0 8px 24px rgba(0, 230, 118, 0.15);
        }

        .back-btn span.arrow {
            transition: transform 0.2s ease;
        }

        .back-btn:hover span.arrow {
            transform: translateX(-4px);
        }
        
        @keyframes smoothFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="lang-pl">

    <div id="loader">
        <div class="loader-content">
            <span class="loader-title">Academy</span>
            <div class="loader-bar-bg"><div class="loader-bar-fill" id="loaderFill"></div></div>
        </div>
    </div>

    <div class="ambient-blobs" id="ambient"></div>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Brak płynności na tym poziomie</h2>
        
        <div class="mini-dom">
            <div class="mini-dom-row ask"><span>405</span><span>120</span></div>
            <div class="mini-dom-row ask"><span>404</span><span>45</span></div>
            <div class="mini-dom-row empty"><span>---</span><span>LVN (Pustka)</span></div>
            <div class="mini-dom-row bid"><span>403</span><span>0</span></div>
        </div>

        <p class="error-desc">
            Wygląda na to, że rynek nie zaakceptował tej ceny (Low Volume Node). Zlecenie trafiło w próżnię, a strona której szukasz nie istnieje.
        </p>

        <a href="index.html" class="back-btn">
            <span class="arrow">←</span> Wróć do bazy
        </a>
    </div>

    <script src="app.js"></script>
</body>
</html>
